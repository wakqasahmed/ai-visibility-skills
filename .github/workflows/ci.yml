name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: List skills
        run: scripts/list-skills.sh | grep -q "skills/ai-visibility/ai-visibility-audit/SKILL.md"
      - name: Validate plugin paths
        run: python3 scripts/validate-plugin.py
      - name: Run ai-visibility-audit behavioral eval
        run: python3 skills/ai-visibility/ai-visibility-audit/eval/run_eval.py
      - name: Run citation-readiness-audit deterministic contract eval
        run: python3 skills/ai-visibility/citation-readiness-audit/eval/run_eval.py
